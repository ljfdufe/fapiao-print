name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # 确保 Node.js 子进程使用 UTF-8
  PYTHONIOENCODING: utf-8

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UTF-8 encoding
        shell: pwsh
        run: |
          # 设置控制台代码页为 UTF-8，确保中文文件名正确
          chcp 65001
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          [Console]::InputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          # 验证
          Write-Host "代码页: $(chcp)"
          Write-Host "测试中文输出: 发票酱"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.x'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build all (4 products)
        shell: pwsh
        run: |
          # 确保构建过程使用 UTF-8
          $env:PYTHONIOENCODING = "utf-8"
          chcp 65001
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          npm run build:all

      - name: Verify artifacts
        shell: pwsh
        run: |
          Write-Host "`n=== 验证构建产物 ==="
          $dist = "dist"
          $expected = @(
            "发票酱_*_x64-setup.exe",
            "发票酱_*_x64_绿色版.exe",
            "发票酱_*_x64_OCR版-setup.exe",
            "发票酱_*_x64_OCR绿色版.zip"
          )
          $files = Get-ChildItem -Path $dist -File
          if ($files.Count -ne 4) {
            Write-Host "❌ 期望 4 个产物，实际找到 $($files.Count) 个"
            $files | ForEach-Object { Write-Host "  - $($_.Name)" }
            exit 1
          }
          $files | ForEach-Object {
            $sizeMB = [math]::Round($_.Length / 1MB, 1)
            Write-Host "✅ $($_.Name) ($sizeMB MB)"
          }

      - name: Rename if Chinese lost (fallback)
        shell: pwsh
        run: |
          # 兜底：如果 NSIS 安装包文件名丢失了中文，强制重命名
          $dist = "dist"
          $version = (Get-Content package.json | ConvertFrom-Json).version

          $renameMap = @{
            # 模式: 不含中文的文件名 → 正确的中文名
            "_${version}_x64-setup.exe"                = "发票酱_${version}_x64-setup.exe"
            "_${version}_x64_OCR.-setup.exe"           = "发票酱_${version}_x64_OCR版-setup.exe"
            "_${version}_x64_OCR-setup.exe"            = "发票酱_${version}_x64_OCR版-setup.exe"
          }

          foreach ($entry in $renameMap.GetEnumerator()) {
            $oldPath = Join-Path $dist $entry.Key
            $newPath = Join-Path $dist $entry.Value
            if (Test-Path $oldPath) {
              Move-Item -Force $oldPath $newPath
              Write-Host "🔄 重命名: $($entry.Key) → $($entry.Value)"
            }
          }

          # 检查绿色便携版文件名（轻量版=exe, OCR版=zip）
          $zipRenameMap = @{
            "_${version}_x64_.exe"                     = "发票酱_${version}_x64_绿色版.exe"
            "_${version}_x64_OCR.zip"                  = "发票酱_${version}_x64_OCR绿色版.zip"
          }

          foreach ($entry in $zipRenameMap.GetEnumerator()) {
            $oldPath = Join-Path $dist $entry.Key
            $newPath = Join-Path $dist $entry.Value
            if (Test-Path $oldPath) {
              Move-Item -Force $oldPath $newPath
              Write-Host "🔄 重命名: $($entry.Key) → $($entry.Value)"
            }
          }

      - name: List final artifacts
        shell: pwsh
        run: |
          Write-Host "`n=== 最终产物列表 ==="
          Get-ChildItem -Path dist -File | ForEach-Object {
            $sizeMB = [math]::Round($_.Length / 1MB, 1)
            Write-Host "  $($_.Name)  ($sizeMB MB)"
          }

      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          # 从 CHANGELOG.md 提取当前 tag 对应段落作为 Release body
          $tag = "${{ github.ref_name }}"
          Write-Host "Extracting release notes for tag: $tag"
          $lines = Get-Content CHANGELOG.md -Encoding UTF8
          $capturing = $false
          $bodyLines = @()
          foreach ($line in $lines) {
            if ($line -match "^## $tag\b") {
              $capturing = $true
              $bodyLines += $line
              continue
            }
            if ($capturing) {
              # 遇到分隔线 --- 表示本段结束
              if ($line -match "^---\s*$") { break }
              # 遇到下一个版本标题也表示结束
              if ($line -match "^## v") { break }
              $bodyLines += $line
            }
          }
          $body = $bodyLines -join "`n"
          if ([string]::IsNullOrWhiteSpace($body)) {
            $body = "See [CHANGELOG](https://github.com/erma0/fapiao-print/blob/master/CHANGELOG.md) for details."
          } else {
            # 末尾追加 CHANGELOG 链接
            $body = $body + "`n`n---`n详见 [CHANGELOG](https://github.com/erma0/fapiao-print/blob/master/CHANGELOG.md)"
          }
          # 写入文件供 release action 使用
          $body | Out-File -FilePath release_body.txt -Encoding UTF8 -NoNewline
          Write-Host "`n=== Release Body Preview ==="
          Write-Host $body

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_body.txt
          draft: false
          prerelease: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
